name: Release

on:
  push:
    tags:
      - "Chapter_*"
      - "v*"

jobs:
  build-iso:
    name: Build release ISO
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bison flex libgmp3-dev libmpc-dev libmpfr-dev mtools nasm grub-pc-bin xorriso texinfo wget

      - name: Cache cross toolchain
        id: cache-cross
        uses: actions/cache@v4
        with:
          path: ${{ runner.tool_cache }}/i686-elf
          key: i686-elf-gcc-13.2.0-binutils-2.41

      - name: Build cross toolchain
        if: steps.cache-cross.outputs.cache-hit != 'true'
        run: |
          set -eux
          export PREFIX="${RUNNER_TOOL_CACHE}/i686-elf"
          export TARGET=i686-elf
          export PATH="${PREFIX}/bin:${PATH}"
          mkdir -p /tmp/cross-src /tmp/cross-build "${PREFIX}"
          cd /tmp/cross-src
          wget -q https://ftp.gnu.org/gnu/binutils/binutils-2.41.tar.xz
          wget -q https://ftp.gnu.org/gnu/gcc/gcc-13.2.0/gcc-13.2.0.tar.xz
          tar -xf binutils-2.41.tar.xz
          tar -xf gcc-13.2.0.tar.xz
          mkdir -p /tmp/cross-build/binutils
          cd /tmp/cross-build/binutils
          /tmp/cross-src/binutils-2.41/configure --target="${TARGET}" --prefix="${PREFIX}" --with-sysroot --disable-nls --disable-werror
          make -j"$(nproc)"
          make install
          mkdir -p /tmp/cross-build/gcc
          cd /tmp/cross-build/gcc
          /tmp/cross-src/gcc-13.2.0/configure --target="${TARGET}" --prefix="${PREFIX}" --disable-nls --enable-languages=c --without-headers
          make all-gcc -j"$(nproc)"
          make all-target-libgcc -j"$(nproc)"
          make install-gcc
          make install-target-libgcc

      - name: Build ISO
        run: |
          export PATH="${RUNNER_TOOL_CACHE}/i686-elf/bin:${PATH}"
          make iso

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: build/toyix.iso
